[package]
name = "crustchan-lib"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "crustchan_lib"
path = "src/lib.rs"
test = false

[dependencies]
anyhow = "1.0.102"
chrono = "0.4.44"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
uuid = { version = "1.21.0", features = ["serde", "v7"] }