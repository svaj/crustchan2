[package]
name = "crustchan-entity"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "entity"
path = "src/lib.rs"

[dependencies]
seaography = { version = "2.0.0-rc", features = ["with-decimal", "with-chrono", "with-uuid", "field-snake-case"] }
chrono = "0.4.44"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
uuid = { version = "1.21.0", features = ["serde", "v7"] }

[dependencies.sea-orm]
version = "~2.0.0-rc" # sea-orm version