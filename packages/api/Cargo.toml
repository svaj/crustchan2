[package]
name = "crustchan-api"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
aide = { version = "0.15.1", features = ["axum", "axum-json", "axum-multipart", "axum-tokio", "redoc", "swagger", "scalar"] }
anyhow = { workspace = true }
dotenvy = "0.15.7"
sea-orm = { version = "2.0.0-rc.36", features = [ "sqlx-postgres","sqlx-sqlite", "runtime-tokio", "macros", "with-json", "with-chrono", "with-uuid", "schema-sync", "entity-registry" ] }
tokio = { version = "1.50.0", features = ["rt", "macros", "rt-multi-thread"] }
axum = { version = "0.8.8", features = ["multipart"] }
rustis = { version = "0.19.1", features = ["tokio-runtime", "json"] }
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "json"] }
tower-cookies = "0.11.0"
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars ={ version = "0.9.0", features = ["uuid1"] }
uuid = { workspace = true }
inventory = "0.3.22"
crustchan-migration = { path = "../migration" }
crustchan-entity = { path = "../entity" }

[dev-dependencies]
sea-orm = { version = "2.0.0-rc.36", features = [ "sqlx-sqlite", "runtime-tokio", "macros", "mock", "with-json", "with-chrono", "with-uuid", "schema-sync", "entity-registry"  ] }


[[bin]]
name = "api"
path = "src/main.rs"
test = false


[package.metadata.scripts]
build-lambda = "cargo lambda build --output-format zip -F lambda --arm64 --no-default-features"
build-api = "cargo build --release --bin api"
watch-api = "cargo watch cargo \"run --bin api\""
run-api = "cargo run --bin api"
lint = "cargo build --bin api && cargo clippy -- -D warnings"